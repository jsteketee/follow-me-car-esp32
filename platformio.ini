; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
; 0 — None
; 1 — Error
; 2 — Warn (current for car)
; 3 — Info
; 4 — Debug
; 5 — Verbose

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BNO08x @ ^1.2.3
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    madhephaestus/ESP32Servo
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
build_src_filter =
    +<*>
    -<test/>

[env:car]
extends = base
build_flags =
    ${base.build_flags}
    -DCORE_DEBUG_LEVEL=2
monitor_echo = yes

; Bench/troubleshooting build: identical to car but silences the 50 Hz telemetry uplink
; so typed/pasted command frames and log lines are readable in the monitor. RX still runs.
[env:car-quiet]
extends = base
build_flags =
    ${base.build_flags}
    -DCORE_DEBUG_LEVEL=2
    -DSERIAL_HAL_TX_DISABLED
monitor_echo = yes

; Pan-servo calibration build: runs the blocking UWB-referenced µs↔degree calibration
; in setup() (pan.cpp, PAN_CAL_TEST block). Telemetry silenced so the cal log is readable.
; Needs a stationary tag roughly dead ahead of the car, 2-4m away.
[env:pan-cal]
extends = base
build_flags =
    ${base.build_flags}
    -DCORE_DEBUG_LEVEL=2
    -DPAN_CAL_TEST
    -DSERIAL_HAL_TX_DISABLED
monitor_echo = yes

[env:test]
extends = base
build_flags =
    ${base.build_flags}
    -DCORE_DEBUG_LEVEL=3
    -DSERIAL_HAL_TX_DISABLED

[env:debug]
extends = base
build_flags =
    ${base.build_flags}
    -DCORE_DEBUG_LEVEL=4

[env:dw3000-test]
extends = base
build_src_filter =
    -<*>
    +<test/dw3000_test.cpp>
build_flags =
    ${base.build_flags}
    -DCORE_DEBUG_LEVEL=3
lib_deps =
monitor_speed = 115200

[env:dw3000-bridge]
extends = base
build_src_filter =
    -<*>
    +<test/dw3000_bridge.cpp>
build_flags =
    ${base.build_flags}
    -DCORE_DEBUG_LEVEL=3
lib_deps =
monitor_speed = 115200
monitor_eol = CRLF
monitor_filters = send_on_enter

[env:as5600-test]
extends = base
build_src_filter =
    -<*>
    +<test/as5600_test.cpp>
build_flags =
    ${base.build_flags}
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    madhephaestus/ESP32Servo
monitor_speed = 115200
monitor_eol = CRLF
monitor_filters = send_on_enter
